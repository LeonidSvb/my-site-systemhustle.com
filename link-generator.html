<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Generator — System Hustle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf8; --bg2: #f2f1ed; --border: rgba(0,0,0,0.08);
    --border-s: rgba(0,0,0,0.14); --text: #1a1a18; --muted: #6b6b66;
    --subtle: #a8a8a2; --accent: #2a6b3c; --sans: 'DM Sans', system-ui, sans-serif;
  }
  body {
    background: var(--bg); font-family: var(--sans); color: var(--text);
    min-height: 100vh; display: flex; justify-content: center;
    align-items: flex-start; padding: 64px 24px;
  }
  .wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 28px; }

  .title { font-size: 22px; font-weight: 500; }
  .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .field { display: flex; flex-direction: column; gap: 7px; }
  label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--subtle); }
  input[type=text] {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border-s); border-radius: 8px;
    font-size: 14px; font-family: var(--sans);
    background: white; color: var(--text); outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--accent); }

  .tier-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tier-opt { position: relative; }
  .tier-opt input { position: absolute; opacity: 0; width: 0; height: 0; }
  .tier-opt label {
    display: flex; flex-direction: column; gap: 4px;
    padding: 14px 16px; border: 1px solid var(--border-s);
    border-radius: 10px; cursor: pointer; background: white;
    transition: border-color .15s, background .15s;
    text-transform: none; letter-spacing: 0; font-size: 14px;
    color: var(--muted); font-weight: 400;
  }
  .tier-opt input:checked + label {
    border-color: var(--accent); background: #e8f4ed; color: var(--text);
  }
  .tier-name { font-weight: 500; color: var(--text); font-size: 14px; }
  .tier-price { font-size: 12px; color: var(--muted); }

  .div { height: 1px; background: var(--border); }

  .output-box {
    display: none; flex-direction: column; gap: 10px;
  }
  .output-box.visible { display: flex; }
  .output-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--subtle); }
  .url-display {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    font-size: 12px; color: var(--muted);
    word-break: break-all; line-height: 1.5;
    font-family: monospace;
  }
  .copy-btn {
    padding: 11px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 13px;
    font-weight: 500; font-family: var(--sans); cursor: pointer;
    transition: opacity .15s;
  }
  .copy-btn:hover { opacity: .88; }
  .copy-btn.copied { background: #1a5a8a; }

  .email-block { display: flex; flex-direction: column; gap: 8px; }
  .email-preview {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
    font-size: 13px; color: var(--muted); line-height: 1.7;
    white-space: pre-wrap;
  }
  .copy-email {
    padding: 9px; background: white; color: var(--muted);
    border: 1px solid var(--border-s); border-radius: 8px;
    font-size: 12px; font-family: var(--sans); cursor: pointer;
    transition: background .15s;
  }
  .copy-email:hover { background: var(--bg2); }
</style>
</head>
<body>
<div class="wrap">

  <div>
    <div class="title">Link Generator</div>
    <div class="sub">Fill in after the call — get the order form link + email draft</div>
  </div>

  <div class="field">
    <label>Client first name</label>
    <input type="text" id="inp-name" placeholder="Rob" oninput="generate()">
  </div>

  <div class="field">
    <label>Tier</label>
    <div class="tier-row">
      <div class="tier-opt">
        <input type="radio" name="tier" id="t-pilot" value="pilot" checked onchange="generate()">
        <label for="t-pilot">
          <span class="tier-name">Starter Pilot</span>
          <span class="tier-price">$800 one-time</span>
        </label>
      </div>
      <div class="tier-opt">
        <input type="radio" name="tier" id="t-full" value="full" onchange="generate()">
        <label for="t-full">
          <span class="tier-name">Full Package</span>
          <span class="tier-price">$3,000/month</span>
        </label>
      </div>
    </div>
  </div>

  <div class="field">
    <label>Guaranteed intros</label>
    <input type="text" id="inp-intros" placeholder="e.g. 2–3 or 8–10" oninput="generate()">
  </div>

  <div class="div"></div>

  <div class="output-box" id="output">

    <div class="output-label">Order form link</div>
    <div class="url-display" id="url-display"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyUrl()">Copy link</button>

    <div class="div" style="margin-top:8px"></div>

    <div class="output-label" style="margin-top:4px">Email draft</div>
    <div class="email-block">
      <div class="email-preview" id="email-preview"></div>
      <button class="copy-email" onclick="copyEmail()">Copy email text</button>
    </div>

  </div>

</div>

<script>
  const BASE = 'https://systemhustle.com/order-form.html';
  const PAYPAL = 'https://paypal.me/LeonidShvorob';

  const EMAIL = {
    pilot: (name, url) =>
`Hey ${name},

Great speaking earlier.

As discussed — starter pilot:
– Signal-based targeting setup for your niche
– 2–3 qualified intros, pre-qualified before your time
– Live tracking with signals and outcomes
– Debrief by day 30

Investment: $800 one-time (credited toward full package if you continue)

Pay here: ${PAYPAL}

Summary: ${url}

Let me know once done and I'll book the kickoff call.

— Leonid`,

    full: (name, url) =>
`Hey ${name},

Great speaking earlier.

As discussed — 3-month package:
– Signal-based monitoring of your niche, ongoing
– 8–10 qualified intros over 90 days
– Warm intros — I set the frame before you call
– Bi-weekly updates + live shared tracker

Investment: $3,000/month (first payment kicks things off)

Pay here: ${PAYPAL}

Summary: ${url}

Let me know once done and I'll book the kickoff call within 48h.

— Leonid`
  };

  function generate() {
    const name = document.getElementById('inp-name').value.trim();
    const tier = document.querySelector('input[name=tier]:checked').value;
    const intros = document.getElementById('inp-intros').value.trim();
    if (!name) { document.getElementById('output').classList.remove('visible'); return; }

    let url = BASE + '?name=' + encodeURIComponent(name) + '&tier=' + tier;
    if (intros) url += '&intros=' + encodeURIComponent(intros);
    document.getElementById('url-display').textContent = url;
    document.getElementById('email-preview').textContent = EMAIL[tier](name, url);
    document.getElementById('output').classList.add('visible');

    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copy link';
    btn.classList.remove('copied');
  }

  function copyUrl() {
    const url = document.getElementById('url-display').textContent;
    navigator.clipboard.writeText(url);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 2000);
  }

  function copyEmail() {
    const text = document.getElementById('email-preview').textContent;
    navigator.clipboard.writeText(text);
    const btn = document.querySelector('.copy-email');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy email text'; }, 2000);
  }
</script>
</body>
</html>
